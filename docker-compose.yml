version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: car_ads_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "#84713869*"
      POSTGRES_DB: car_ads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car_ads_app
    ports:
      - "7000:7000"
    environment:
      # We override DATABASE_URL here to point to the 'db' container instead of 'localhost'
      DATABASE_URL: "postgresql://postgres:%2384713869%2A@db:5432/car_ads"
      PORT: 7000
    env_file:
      - .env
    depends_on:
      - db
    # Run migrations before starting the app
    command: sh -c "npx prisma migrate deploy && npm start"
    restart: unless-stopped

volumes:
  postgres_data:
